name: CI

on:
  # Запуск на push в main.
  push:
    branches: [main]
  # Запуск для pull request, чтобы проверка шла до merge.
  pull_request:
    branches: [main]
  # Ручной запуск из вкладки Actions.
  workflow_dispatch:

# Если в одну и ту же ветку прилетает новый коммит,
# старый незавершенный прогон отменяется.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  tests-postgres:
    name: Tests (PostgreSQL, Python 3.11)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: proxies_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d proxies_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      # Проверяем Postgres-ветку в tests/conftest.py (создание/удаление test_<uuid> схем).
      TEST_DATABASE_URL: postgresql+asyncpg://postgres:postgres@127.0.0.1:5432/proxies_test
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[test,postgres]"

      - name: Run tests (excluding real API integration tests)
        run: pytest -q -m "not integration"

  build:
    name: Build package
    runs-on: ubuntu-latest
    needs: [tests-postgres]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: pyproject.toml

      - name: Build distribution artifacts
        run: |
          python -m pip install --upgrade pip
          python -m pip install build
          python -m build
